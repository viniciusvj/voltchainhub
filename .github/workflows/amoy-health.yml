name: Amoy Health

# Read-only weekly check that the live Amoy deployment is reachable and
# holds the expected state (device count, LuzToken supply, marketplace fee).
# No secrets: uses the public Amoy RPC. Also runnable on demand.

on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch:

jobs:
  amoy-integration:
    name: Backend integration test against live Amoy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    env:
      AMOY_INTEGRATION: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Amoy integration test
        run: npx vitest run tests/amoy-integration.test.ts
